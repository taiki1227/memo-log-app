<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memo Log</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <p class="eyebrow">TiDB Cloud Memo App</p>
        <h1>Memo Log</h1>
        <p>保存・編集・削除・文字数カウントができるシンプルなメモ帳アプリ</p>
      </div>
    </header>

    <section class="card">
      <h2 id="formTitle">新規メモ</h2>

      <form id="memoForm">
        <input type="hidden" id="noteId" />

        <label for="title">タイトル</label>
        <input
          type="text"
          id="title"
          placeholder="例：今日の学び"
          maxlength="255"
          required
        />

        <label for="body">本文</label>
        <textarea
          id="body"
          rows="8"
          placeholder="メモを書いてください"
        ></textarea>

        <div class="form-meta">
          <span>文字数：<strong id="charCount">0</strong>文字</span>
        </div>

        <div class="actions">
          <button type="submit" id="saveButton">保存</button>
          <button type="button" id="cancelButton" class="secondary hidden">キャンセル</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>メモ一覧</h2>
        <button type="button" id="reloadButton" class="secondary">再読み込み</button>
      </div>

      <p id="message" class="message"></p>

      <div id="notesList" class="notes-list">
        <p class="empty">読み込み中...</p>
      </div>
    </section>
  </main>

  <script src="/src/app.js"></script>
</body>
</html>
